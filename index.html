<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeff Manager - Kanban Board</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-dark: #0d1117;
      --bg-card: #161b22;
      --bg-column: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --success: #238636;
      --warning: #d29922;
      --danger: #da3633;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    h1 { color: var(--accent); font-size: 28px; }
    .add-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
    .kanban {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }
    .column {
      background: var(--bg-column);
      border-radius: 12px;
      padding: 15px;
      min-height: 400px;
    }
    .column-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .column-title { font-weight: bold; font-size: 14px; text-transform: uppercase; }
    .col-todo .column-title { color: var(--accent); }
    .col-progress .column-title { color: var(--warning); }
    .col-blocked .column-title { color: var(--danger); }
    .col-completed .column-title { color: var(--success); }
    .task-count {
      background: var(--bg-dark);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
    }
    .tasks-list { display: flex; flex-direction: column; gap: 10px; }
    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
    }
    .task-title { font-weight: bold; margin-bottom: 6px; }
    .task-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .task-meta { font-size: 11px; color: var(--text-muted); }
    
    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 30px;
      width: 400px;
    }
    .modal h2 { margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--text-muted); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 6px;
    }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel { background: var(--bg-dark); color: var(--text); border: 1px solid var(--border); padding: 10px 20px; border-radius: 6px; cursor: pointer; }
    .btn-submit { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
    
    .empty { text-align: center; color: var(--text-muted); padding: 30px; }
  </style>
</head>
<body>
  <header>
    <h1>Jeff Manager / Kanban</h1>
    <button class="add-btn" id="addBtn">+ Add Task</button>
  </header>
  
  <div class="kanban">
    <div class="column col-todo">
      <div class="column-header">
        <span class="column-title">To Do</span>
        <span class="task-count" id="todoCount">0</span>
      </div>
      <div class="tasks-list" id="todoList"></div>
    </div>
    
    <div class="column col-progress">
      <div class="column-header">
        <span class="column-title">In Progress</span>
        <span class="task-count" id="progressCount">0</span>
      </div>
      <div class="tasks-list" id="progressList"></div>
    </div>
    
    <div class="column col-blocked">
      <div class="column-header">
        <span class="column-title">Blocked</span>
        <span class="task-count" id="blockedCount">0</span>
      </div>
      <div class="tasks-list" id="blockedList"></div>
    </div>
    
    <div class="column col-completed">
      <div class="column-header">
        <span class="column-title">Completed</span>
        <span class="task-count" id="completedCount">0</span>
      </div>
      <div class="tasks-list" id="completedList"></div>
    </div>
  </div>
  
  <!-- Modal -->
  <div class="modal" id="taskModal">
    <div class="modal-content">
      <h2>Add New Task</h2>
      <form id="taskForm">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="taskTitle" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="taskDesc"></textarea>
        </div>
        <div class="form-group">
          <label>Template</label>
          <select id="taskTemplate">
            <option value="light">Light (4k tokens, 60s)</option>
            <option value="medium" selected>Medium (10k tokens, 180s)</option>
            <option value="heavy">Heavy (20k tokens, 300s)</option>
            <option value="claude">Claude (50k tokens, 600s)</option>
          </select>
        </div>
        <div class="modal-btns">
          <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn-submit">Create</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API = 'https://jeff-manager.onrender.com/api';
    let tasks = [];
    let templates = {};
    
    // Load data
    async function loadData() {
      try {
        const res = await fetch(API + '/config');
        const data = await res.json();
        templates = data.templates || {};
        tasks = data.tasks || [];
        render();
      } catch (e) {
        console.error('Error loading:', e);
      }
    }
    
    function render() {
      const lists = {
        todo: document.getElementById('todoList'),
        progress: document.getElementById('progressList'),
        blocked: document.getElementById('blockedList'),
        completed: document.getElementById('completedList')
      };
      const counts = { todo: 0, progress: 0, blocked: 0, completed: 0 };
      
      Object.values(lists).forEach(l => l.innerHTML = '');
      
      tasks.forEach(task => {
        const status = task.status || 'todo';
        counts[status]++;
        
        const t = templates[task.template] || {};
        const div = document.createElement('div');
        div.className = 'task-card';
        div.innerHTML = `
          <div class="task-title">${task.title}</div>
          <div class="task-desc">${task.description || ''}</div>
          <div class="task-meta">${t.model || ''} • ${t.timeoutSeconds || 0}s</div>
        `;
        div.onclick = () => moveTask(task.id, status);
        
        if (lists[status]) lists[status].appendChild(div);
      });
      
      document.getElementById('todoCount').textContent = counts.todo;
      document.getElementById('progressCount').textContent = counts.progress;
      document.getElementById('blockedCount').textContent = counts.blocked;
      document.getElementById('completedCount').textContent = counts.completed;
    }
    
    async function moveTask(id, currentStatus) {
      const statuses = ['todo', 'progress', 'blocked', 'completed'];
      const currentIdx = statuses.indexOf(currentStatus);
      const nextStatus = statuses[(currentIdx + 1) % statuses.length];
      
      try {
        await fetch(API + '/tasks/' + id, {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({status: nextStatus})
        });
        loadData();
      } catch (e) {
        console.error('Error:', e);
      }
    }
    
    // Modal
    const modal = document.getElementById('taskModal');
    document.getElementById('addBtn').onclick = () => modal.classList.add('show');
    document.getElementById('cancelBtn').onclick = () => modal.classList.remove('show');
    
    // Submit
    document.getElementById('taskForm').onsubmit = async (e) => {
      e.preventDefault();
      const title = document.getElementById('taskTitle').value;
      const desc = document.getElementById('taskDesc').value;
      const template = document.getElementById('taskTemplate').value;
      
      try {
        await fetch(API + '/tasks', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({title: title, description: desc, template: template, status: 'todo'})
        });
        modal.classList.remove('show');
        document.getElementById('taskForm').reset();
        loadData();
      } catch (e) {
        console.error('Error:', e);
      }
    };
    
    loadData();
    setInterval(loadData, 5000);
  </script>
</body>
</html>
