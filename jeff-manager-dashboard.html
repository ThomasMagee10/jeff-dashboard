<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeff Manager Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 20px;
      min-height: 100vh;
    }
    h1 { color: #58a6ff; margin-bottom: 5px; }
    h2 { color: #8b949e; font-size: 14px; font-weight: normal; margin-bottom: 20px; }
    
    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 15px 25px;
      text-align: center;
      min-width: 120px;
    }
    .stat-value { font-size: 28px; font-weight: bold; }
    .stat-label { color: #8b949e; font-size: 12px; margin-top: 5px; }
    .stat-active .stat-value { color: #3fb950; }
    .stat-queued .stat-value { color: #d29922; }
    .stat-completed .stat-value { color: #58a6ff; }
    
    .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    
    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px;
    }
    .panel h3 { 
      color: #e6edf3; 
      font-size: 16px; 
      margin-bottom: 15px; 
      padding-bottom: 10px;
      border-bottom: 1px solid #30363d;
    }
    
    .template-item {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .template-name { color: #58a6ff; font-weight: bold; }
    .template-meta { color: #8b949e; font-size: 12px; margin-top: 5px; }
    .template-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      margin-right: 5px;
    }
    .badge-light { background: #238636; color: white; }
    .badge-medium { background: #d29922; color: black; }
    .badge-heavy { background: #da3633; color: white; }
    
    .job-item {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .job-id { font-family: monospace; color: #58a6ff; }
    .job-task { color: #8b949e; font-size: 12px; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
    .job-status { 
      padding: 3px 10px; 
      border-radius: 12px; 
      font-size: 11px;
      font-weight: bold;
    }
    .status-running { background: #238636; color: white; }
    .status-completed { background: #30363d; color: #8b949e; }
    .status-failed { background: #da3633; color: white; }
    .status-queued { background: #d29922; color: black; }
    
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #30363d;
    }
    .setting-label { color: #8b949e; }
    .toggle {
      width: 40px;
      height: 20px;
      background: #30363d;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
    }
    .toggle.on { background: #238636; }
    .toggle::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }
    .toggle.on::after { left: 22px; }
    
    .task-input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      color: white;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-family: inherit;
    }
    .task-input:focus { outline: none; border-color: #58a6ff; }
    
    .btn {
      background: #238636;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn:hover { background: #2ea043; }
    .btn-secondary { background: #30363d; }
    .btn-secondary:hover { background: #484f58; }
    
    .section { margin-bottom: 25px; }
    .section-title { 
      color: #58a6ff; 
      font-size: 14px; 
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <h1>⚡ Jeff Manager</h1>
  <h2>Multi-Bot Orchestration Dashboard</h2>
  
  <div class="stats-bar">
    <div class="stat-card stat-active">
      <div class="stat-value" id="statActive">0</div>
      <div class="stat-label">Active Bots</div>
    </div>
    <div class="stat-card stat-queued">
      <div class="stat-value" id="statQueued">0</div>
      <div class="stat-label">Queued</div>
    </div>
    <div class="stat-card stat-completed">
      <div class="stat-value" id="statCompleted">0</div>
      <div class="stat-label">Completed</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statJobs">0</div>
      <div class="stat-label">Total Jobs</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statTokens">0</div>
      <div class="stat-label">Tokens Used</div>
    </div>
  </div>
  
  <div class="grid">
    <div>
      <div class="panel">
        <h3>📋 Bot Templates</h3>
        <div id="templates"></div>
      </div>
      
      <div class="panel" style="margin-top: 20px;">
        <h3>⚙️ Global Settings</h3>
        <div class="settings-grid">
          <div class="setting-row">
            <span class="setting-label">Allow Spawning</span>
            <div class="toggle on" id="toggleSpawning"></div>
          </div>
          <div class="setting-row">
            <span class="setting-label">Auto-Retry</span>
            <div class="toggle on" id="toggleRetry"></div>
          </div>
          <div class="setting-row">
            <span class="setting-label">Max Concurrent</span>
            <span id="maxConcurrent">3</span>
          </div>
        </div>
      </div>
    </div>
    
    <div>
      <div class="panel">
        <h3>🚀 Spawn New Bot</h3>
        <textarea class="task-input" id="taskInput" rows="3" placeholder="Describe the task..."></textarea>
        <div style="display: flex; gap: 10px;">
          <select class="task-input" id="templateSelect" style="width: auto;">
            <option value="">Auto-select template</option>
            <option value="light">Light (4k tokens)</option>
            <option value="medium">Medium (10k tokens)</option>
            <option value="heavy">Heavy (20k tokens)</option>
          </select>
          <button class="btn" onclick="spawnBot()">Spawn</button>
        </div>
      </div>
      
      <div class="panel" style="margin-top: 20px;">
        <h3>📊 Recent Jobs</h3>
        <div id="jobs"></div>
      </div>
    </div>
  </div>
  
  <script>
    // Change this to your tunnel URL when deployed
    const API_BASE = 'https://voip-programs-janet-chancellor.trycloudflare.com';
    
    function loadConfig() {
      const url = API_BASE ? API_BASE + '/jeff-manager.json' : '/jeff-manager.json';
      return fetch(url).then(r => r.json()).catch(() => null);
    }
    
    async function spawnBot() {
      const task = document.getElementById('taskInput').value;
      const template = document.getElementById('templateSelect').value;
      
      if (!task.trim()) return alert('Please enter a task');
      
      const apiUrl = API_BASE ? API_BASE + '/api/spawn' : '/api/spawn';
      const response = await fetch(apiUrl, {
      if (!data) return;
      
      document.getElementById('statActive').textContent = data.active;
      document.getElementById('statQueued').textContent = data.queued;
      document.getElementById('statCompleted').textContent = data.completed;
      document.getElementById('statJobs').textContent = data.stats.totalJobs;
      document.getElementById('statTokens').textContent = (data.stats.totalTokens / 1000).toFixed(1) + 'k';
      
      // Templates
      const templatesHtml = Object.entries(data.templates).map(([key, t]) => `
        <div class="template-item">
          <div class="template-name">
            <span class="template-badge badge-${key}">${key.toUpperCase()}</span>
            ${t.name}
          </div>
          <div class="template-meta">
            Model: ${t.model} | Max: ${t.maxTokens} tokens | Timeout: ${t.timeoutSeconds}s
          </div>
        </div>
      `).join('');
      document.getElementById('templates').innerHTML = templatesHtml;
      
      // Jobs
      const jobsHtml = data.jobs.map(job => `
        <div class="job-item">
          <div>
            <div class="job-id">${job.id}</div>
            <div class="job-task">${job.task.substring(0, 60)}${job.task.length > 60 ? '...' : ''}</div>
          </div>
          <div class="job-status status-${job.status}">${job.status.toUpperCase()}</div>
        </div>
      `).join('');
      document.getElementById('jobs').innerHTML = jobsHtml || '<p style="color: #8b949e;">No jobs yet</p>';
    }
    
    async function spawnBot() {
      const task = document.getElementById('taskInput').value;
      const template = document.getElementById('templateSelect').value;
      
      if (!task.trim()) return alert('Please enter a task');
      
      // Send to manager
      const response = await fetch('/api/spawn', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({task, template: template || null})
      });
      
      const result = await response.json();
      alert(result.message || result.error);
      
      if (result.jobId) {
        document.getElementById('taskInput').value = '';
        refresh();
      }
    }
    
    async function refresh() {
      const data = await loadConfig();
      render(data);
    }
    
    // Toggle handlers
    document.getElementById('toggleSpawning').onclick = function() {
      this.classList.toggle('on');
    };
    document.getElementById('toggleRetry').onclick = function() {
      this.classList.toggle('on');
    };
    
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
